<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Muon Tra Sach</title></head>
<body>
    <h1>🔄 Quan Ly Muon / Tra Sach</h1>
    <a href="/">← Trang Chu</a>
    <h3>Sach Dang Qua Han:</h3>
    <table border="1" cellpadding="8" style="margin-top:10px; border-collapse:collapse;">
        <tr><th>Thanh Vien</th><th>Ten Sach</th><th>Ngay Muon</th><th>Han Tra</th><th>Hanh Dong</th></tr>
        <tr th:each="r : ${records}">
            <td th:text="${r.member.fullName}"></td>
            <td th:text="${r.book.title}"></td>
            <td th:text="${r.borrowDate}"></td>
            <td th:text="${r.dueDate}"></td>
            <td>
                <form th:action="@{/borrow/return/{id}(id=${r.id})}" method="post">
                    <button type="submit">Tra Sach</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
