<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sách</title>
</head>

<body>

    <h1>Quản Lý Sách</h1>

    <div th:if="${successMessage}" style="color:green; padding:8px; border:1px solid green; margin-bottom:10px;">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" style="color:red; padding:8px; border:1px solid red; margin-bottom:10px;">
        <span th:text="${errorMessage}"></span>
    </div>

    <div style="margin-bottom:15px;">
        <a th:href="@{/books/new}" sec:authorize="hasRole('LIBRARIAN')">Thêm Sách Mới</a>
        &nbsp;&nbsp;
        <a href="/">Trang Chủ</a>
    </div>

    <form th:action="@{/books}" method="get" style="margin-bottom:15px;">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên hoặc tác giả..." />
        <button type="submit">Tìm Kiếm</button>
        <a th:href="@{/books}">Xóa Bộ Lọc</a>
    </form>

    <table border="1" cellpadding="8" style="border-collapse:collapse; width:100%;">
        <tr>
            <th>ID</th>
            <th>Mã Sách</th>
            <th>Tên Sách</th>
            <th>Tác Giả</th>
            <th>Nhà Xuất Bản</th>
            <th>Thể Loại</th>
            <th>Tổng Số Bản</th>
            <th>Còn Lại</th>
            <th sec:authorize="hasRole('LIBRARIAN')">Hành Động</th>
            <th sec:authorize="hasRole('MEMBER')">Thuê Sách</th>
        </tr>

        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.bookCode}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.publisher}"></td>
            <td th:text="${book.category}"></td>
            <td th:text="${book.totalCopies}"></td>
            <td th:text="${book.availableCopies}"
                th:style="${book.availableCopies == 0} ? 'color:red; font-weight:bold;' : ''">
            </td>

            <!-- Librarian: Sửa / Xóa -->
            <td sec:authorize="hasRole('LIBRARIAN')">
                <a th:href="@{/books/edit/{id}(id=${book.id})}">Sửa</a>
                &nbsp;
                <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('Bạn có chắc muốn xóa sách này?');">
                    <button type="submit">Xóa</button>
                </form>
            </td>

            <!-- Member: Thuê sách - ẩn nút nếu hết sách -->
            <td sec:authorize="hasRole('MEMBER')">
                <a th:if="${book.availableCopies > 0}" th:href="@{/member/borrow/{id}(id=${book.id})}">Thuê</a>
                <span th:if="${book.availableCopies == 0}" style="color:red;">Hết sách</span>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(books)}">
            <td colspan="9" style="text-align:center; color:gray; padding:20px;">
                Chưa có sách nào.
            </td>
        </tr>
    </table>

</body>

</html>
