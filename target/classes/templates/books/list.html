<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Danh Sach Sach</title></head>
<body>
    <h1>📖 Quan Ly Sach</h1>
    <a href="/books/add">+ Them Sach Moi</a> | <a href="/">← Trang Chu</a>
    <table border="1" cellpadding="8" style="margin-top:20px; border-collapse:collapse;">
        <tr>
            <th>ID</th><th>Ten Sach</th><th>Tac Gia</th>
            <th>The Loai</th><th>Con Lai</th><th>Hanh Dong</th>
        </tr>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.category}"></td>
            <td th:text="${book.availableCopies}"></td>
            <td>
                <a th:href="@{/books/edit/{id}(id=${book.id})}">Sua</a> |
                <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post" style="display:inline">
                    <button type="submit">Xoa</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
