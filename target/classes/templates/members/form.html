<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Dang Ky Thanh Vien</title></head>
<body>
    <h1>👥 Dang Ky Thanh Vien Moi</h1>
    <form th:action="@{/members/register}" method="post" th:object="${member}">
        <table>
            <tr><td>Ho Ten:</td><td><input type="text" th:field="*{fullName}" id="fullName"/></td></tr>
            <tr><td>Email:</td><td><input type="text" th:field="*{email}" id="email"/></td></tr>
            <tr><td>So Dien Thoai:</td><td><input type="text" th:field="*{phone}" id="phone"/></td></tr>
        </table>
        <br/>
        <button type="submit" id="submitBtn">Dang Ky</button>
        <a href="/members">Huy</a>
    </form>
</body>
</html>
