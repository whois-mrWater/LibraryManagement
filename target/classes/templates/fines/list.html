<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Quan Ly Phat</title></head>
<body>
    <h1>💰 Quan Ly Tien Phat</h1>
    <a href="/">← Trang Chu</a>
    <table border="1" cellpadding="8" style="margin-top:20px; border-collapse:collapse;">
        <tr><th>ID</th><th>So Ngay Tre</th><th>Tien Phat</th><th>Trang Thai</th><th>Hanh Dong</th></tr>
        <tr th:each="f : ${fines}">
            <td th:text="${f.id}"></td>
            <td th:text="${f.overdueDays}"></td>
            <td th:text="${f.amount} + ' VND'"></td>
            <td th:text="${f.paid ? 'Da dong' : 'Chua dong'}"></td>
            <td>
                <form th:action="@{/fines/pay/{id}(id=${f.id})}" method="post">
                    <button type="submit" th:disabled="${f.paid}">Dong Phat</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
