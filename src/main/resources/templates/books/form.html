<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Form Sách</title></head>
<body>
    <!-- Tiêu đề thay đổi theo ngữ cảnh: thêm mới hay sửa -->
    <h1 th:text="${book.id == null} ? '📖 Thêm Sách Mới' : '✏️ Chỉnh Sửa Sách'"></h1>

    <!-- Thông báo lỗi -->
    <div th:if="${errorMessage}" style="color:red; padding:8px; border:1px solid red;">
        ⚠️ <span th:text="${errorMessage}"></span>
    </div>

    <!--
        th:action động:
        - Nếu book.id == null  → đang THÊM MỚI → gửi lên /books/new
        - Nếu book.id có giá trị → đang SỬA    → gửi lên /books/edit/{id}
    -->
    <form th:action="${book.id == null} ? @{/books/new} : @{/books/edit/{id}(id=${book.id})}"
          method="post"
          th:object="${book}">

        <table>
            <tr>
                <td>Mã Sách:</td>
                <td><input type="text" th:field="*{bookCode}" placeholder="VD: BK011"/></td>
            </tr>
            <tr>
                <td>Tên Sách:</td>
                <td><input type="text" th:field="*{title}" placeholder="VD: Dế Mèn Phiêu Lưu Ký"/></td>
            </tr>
            <tr>
                <td>Tác Giả:</td>
                <td><input type="text" th:field="*{author}" placeholder="VD: Tô Hoài"/></td>
            </tr>
            <tr>
                <td>Nhà Xuất Bản:</td>
                <td><input type="text" th:field="*{publisher}" placeholder="VD: Kim Đồng"/></td>
            </tr>
            <tr>
                <td>Thể Loại:</td>
                <td><input type="text" th:field="*{category}" placeholder="VD: Văn học trẻ em"/></td>
            </tr>
            <tr>
                <td>Tổng Số Bản:</td>
                <td><input type="number" th:field="*{totalCopies}" min="1"/></td>
            </tr>
            <tr>
                <td>Số Bản Hiện Có:</td>
                <td><input type="number" th:field="*{availableCopies}" min="0"/></td>
            </tr>
        </table>

        <br/>
        <!-- Nút Lưu cũng thay đổi label theo ngữ cảnh -->
        <button type="submit" id="submitBtn"
                th:text="${book.id == null} ? 'Thêm Sách' : 'Cập Nhật'">
        </button>
        <a th:href="@{/books}">Hủy</a>
    </form>
</body>
</html>
