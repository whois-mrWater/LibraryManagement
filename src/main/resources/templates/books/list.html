<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sach Sach</title>
</head>
<body>

<h1>📚 Quản Lý Sách</h1>

<!-- Thông báo thành công / lỗi -->
<div th:if="${successMessage}" style="color:green; padding:8px; border:1px solid green; margin-bottom:10px;">
    <span th:text="${successMessage}"></span>
</div>
<div th:if="${errorMessage}" style="color:red; padding:8px; border:1px solid red; margin-bottom:10px;">
    <span th:text="${errorMessage}"></span>
</div>

<!-- Nút thêm + Tìm kiếm -->
<div style="margin-bottom:15px;">
    <a th:href="@{/books/new}">➕ Thêm Sách Mới</a>
    &nbsp;&nbsp;
    <a href="/">🏠 Trang Chủ</a>
</div>

<!-- Form tìm kiếm -->
<form th:action="@{/books}" method="get" style="margin-bottom:15px;">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên hoặc tác giả..."/>
    <button type="submit">🔍 Tìm Kiếm</button>
    <a th:href="@{/books}">Xóa Bộ Lọc</a>
</form>

<!-- Bảng danh sách -->
<table border="1" cellpadding="8" style="border-collapse:collapse; width:100%;">
    <tr>
        <th>ID</th>
        <th>Mã Sách</th>
        <th>Tên Sách</th>
        <th>Tác Giả</th>
        <th>Nhà Xuất Bản</th>
        <th>Thể Loại</th>
        <th>Tổng Số Bản</th>
        <th>Còn Lại</th>
        <th>Hành Động</th>
    </tr>

    <!-- Dòng dữ liệu -->
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.bookCode}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.publisher}"></td>
        <td th:text="${book.category}"></td>
        <td th:text="${book.totalCopies}"></td>
        <!-- Tô màu đỏ nếu hết sách -->
        <td th:text="${book.availableCopies}"
            th:style="${book.availableCopies == 0} ? 'color:red; font-weight:bold;' : ''">
        </td>
        <td>
            <!-- Nút Sửa -->
            <a th:href="@{/books/edit/{id}(id=${book.id})}">✏️ Sửa</a>
            &nbsp;
            <!-- Nút Xóa -->
            <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post"
                  style="display:inline;"
                  onsubmit="return confirm('Bạn có chắc muốn xóa sách này?');">
                <button type="submit">🗑️ Xóa</button>
            </form>
        </td>
    </tr>

    <!-- Khi không có sách nào -->
    <tr th:if="${#lists.isEmpty(books)}">
        <td colspan="9" style="text-align:center; color:gray; padding:20px;">
            Chưa có sách nào. Hay thêm sách mới!
        </td>
    </tr>
</table>

</body>
</html>
