# ============================================================================
# H2 Database Configuration (Development)
# ============================================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL Data Initialization (tự động load data.sql)
spring.sql.init.mode=always
spring.sql.init.data-locations=\
    classpath:users.sql,\
    classpath:books.sql,\
    classpath:members.sql,\
    classpath:borrow_records.sql,\
    classpath:fines.sql,\
    classpath:reservations.sql

# H2 Console (cho phép truy cập H2 Console để xem DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.com.library=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG
